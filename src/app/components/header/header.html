<header class="header">
  <div class="header__inner">
    <a class="header__logo" href="/" aria-label="Shva home">
      <img
        ngSrc="assets/shva-logo.svg"
        alt="Shva"
        width="201"
        height="58"
        priority
      />
    </a>

    <app-language-toggle
      [language]="language()"
      (languageChange)="languageChange.emit($event)"
    />
  </div>
</header>
